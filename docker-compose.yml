services:
  backend:
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    expose:
      - "8000"

  frontend:
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

  bot:
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    build: ./bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # шарит ту же БД что и бэкенд
      - sqlite_data:/app/data
    depends_on:
      - backend

volumes:
  sqlite_data:
