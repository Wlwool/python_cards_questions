name: Tests

on: [push, pull_request]

jobs:
  test-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        working-directory: bot
        run: uv sync

      - name: Run tests
        working-directory: bot
        run: uv run pytest tests/ -v
